<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADAM.CARROLL.SYS</title>
<meta name="description" content="Adam L. Carroll — Technologist, tinkerer, and proprietor of the Last Outpost divisions. Based in Poulsbo, WA.">
<meta name="author" content="Adam L. Carroll">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0d0a; color: #d6f5dc;
    font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;
    overscroll-behavior: none;
  }
  * { box-sizing: border-box; }
  ::selection { background: #00ff66; color: #0a0d0a; }

  body, a, button, [role="button"] {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='24' viewBox='0 0 16 24'><rect x='2' y='2' width='4' height='16' fill='%2300ff66' opacity='.9'/><rect x='0' y='0' width='8' height='2' fill='%2300ff66'/><rect x='0' y='18' width='8' height='2' fill='%2300ff66'/></svg>") 4 4, crosshair;
  }
  input, textarea { cursor: text !important; }

  @keyframes alc-blink { 0%, 55% { opacity: 1; } 60%, 100% { opacity: 0; } }
  .alc-blink { animation: alc-blink 1.05s steps(1) infinite; }
  .alc-cursor { display: inline-block; animation: alc-blink 1.05s steps(1) infinite; margin-left: 2px; }

  @keyframes alc-flick { 0%, 97%, 100% { opacity: 0; } 98% { opacity: 0.6; } 99% { opacity: 0.2; } }
  .alc-flicker { animation: alc-flick 6s infinite; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0d0a; }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,102,0.25); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,255,102,0.45); }

  body { text-shadow: 0 0 1px rgba(0,255,102,0.15); }

  /* Mobile nav — hidden on desktop */
  .alc-mobile-nav { display: none; }
  .alc-ascii-art { overflow-x: auto; }

  @media (max-width: 900px) {
    .alc-layout { grid-template-columns: 1fr !important; }
    .alc-sidebar-left, .alc-sidebar-right { display: none !important; }
    .alc-main { padding: 20px 18px 140px !important; max-width: 100% !important; }
    .alc-mobile-nav { display: flex !important; }
    .alc-mobile-fab { display: none !important; }
    .alc-ascii-art { display: none !important; }
    .alc-boot-screen { padding: 24px !important; }
    .alc-proj-detail { padding-left: 14px !important; }
    .alc-topbar-coords { display: none !important; }
  }
  @media (max-width: 600px) {
    .alc-divisions-grid { grid-template-columns: 1fr !important; }
    .alc-interests-grid { grid-template-columns: 1fr 1fr !important; }
    .alc-cv-grid { grid-template-columns: 1fr !important; }
    .alc-contact-socials { grid-template-columns: 1fr 1fr !important; }
    .alc-projects-row { grid-template-columns: 80px 1fr 30px !important; }
    .alc-projects-meta { display: none !important; }
    .alc-vcf-grid { grid-template-columns: 90px 1fr !important; }
  }

  /* iOS safe area */
  .alc-statusbar { padding-bottom: max(6px, env(safe-area-inset-bottom)) !important; }
  .alc-mobile-nav { padding-bottom: env(safe-area-inset-bottom) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── Configuration ────────────────────────────────────────────────────────────
// To enable the SENTRY AI panel, deploy a backend (e.g. Cloudflare Worker) that
// accepts POST { messages: [{role, content}], system: string } → { reply: string }
// then set: window.SENTRY_API_URL = 'https://sentry.adamlcarroll.com'; in a script tag
// before this file loads, or inject it at serve time.

const SENTRY_API_URL = (typeof window !== 'undefined' && window.SENTRY_API_URL) || null;

// ─── Design tokens ────────────────────────────────────────────────────────────
const T = {
  bg:       '#0a0d0a',
  bgDeep:   '#050705',
  bgPanel:  'rgba(0,255,102,0.02)',
  bgWash:   'rgba(0,255,102,0.06)',
  phos:     '#00ff66',
  phosBrt:  '#7dffa8',
  phosDim:  'rgba(0,255,102,0.55)',
  phosGhst: 'rgba(0,255,102,0.18)',
  phosFnt:  'rgba(0,255,102,0.08)',
  warn:     '#ffb000',
  alert:    '#ff4500',
  ink:      '#d6f5dc',
  inkDim:   'rgba(214,245,220,0.65)',
  mono:     '"JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace',
  disp:     '"VT323", "JetBrains Mono", ui-monospace, monospace',
};

const SCANLINES = `repeating-linear-gradient(180deg,
  rgba(0,255,102,0) 0px, rgba(0,255,102,0) 2px,
  rgba(0,0,0,0.22) 3px, rgba(0,0,0,0.22) 3px)`;

// ─── Primitives ───────────────────────────────────────────────────────────────

function Cursor({ c = '▌' }) {
  return <span className="alc-cursor" style={{ color: T.phos }}>{c}</span>;
}

function Chip({ children, tone = 'phos' }) {
  const color = tone === 'warn' ? T.warn : tone === 'alert' ? T.alert : T.phos;
  return (
    <span style={{
      display: 'inline-block', border: `1px solid ${color}`, color,
      fontFamily: T.mono, fontSize: 10, letterSpacing: 1.5,
      padding: '3px 8px 4px', textTransform: 'uppercase',
      lineHeight: 1.4, marginRight: 5, marginBottom: 6,
      whiteSpace: 'nowrap', verticalAlign: 'middle',
    }}>{children}</span>
  );
}

function Bar({ pct = 50, tone = 'phos' }) {
  const color = tone === 'warn' ? T.warn : tone === 'alert' ? T.alert : T.phos;
  const [v, setV] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(() => setV(pct), 80); return () => clearTimeout(t); }, [pct]);
  return (
    <div style={{
      height: 6, width: '100%', background: T.phosFnt,
      border: `1px solid ${color}40`, position: 'relative', overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', top: 0, left: 0, bottom: 0, width: `${v}%`,
        background: `repeating-linear-gradient(90deg, ${color}, ${color} 4px, transparent 4px, transparent 6px)`,
        transition: 'width 0.8s cubic-bezier(.2,.7,.2,1)',
      }} />
    </div>
  );
}

function SectionHeader({ num, title, right }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      borderBottom: `1px solid ${T.phosGhst}`, paddingBottom: 10, marginBottom: 18,
    }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 14 }}>
        <span style={{ fontSize: 11, color: T.phosDim, letterSpacing: 3 }}>§ {num}</span>
        <span style={{ fontFamily: T.disp, fontSize: 28, color: T.phos, letterSpacing: 2, textShadow: `0 0 10px ${T.phos}` }}>{title}</span>
      </div>
      {right && <div style={{ fontSize: 10, color: T.phosDim, letterSpacing: 2 }}>{right}</div>}
    </div>
  );
}

function CRTOverlay() {
  return (
    <>
      <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', background: SCANLINES, zIndex: 100, mixBlendMode: 'multiply' }} />
      <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', background: 'radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%)', zIndex: 99 }} />
      <div className="alc-flicker" style={{ position: 'fixed', inset: 0, pointerEvents: 'none', background: 'rgba(0,255,102,0.015)', zIndex: 98 }} />
    </>
  );
}

// ─── Boot sequence ────────────────────────────────────────────────────────────
const BOOT_LINES = [
  { t: '[BIOS] PHOSPHOR LINK v3.14.1 ........ OK' },
  { t: '[BIOS] memory check ................ 16.0 TiB' },
  { t: '[BIOS] coffee reservoir ............ CRITICAL', tone: 'alert' },
  { t: '[INIT] loading kernel/adam ......... OK' },
  { t: '[INIT] mounting /divisions/company . OK' },
  { t: '[INIT] mounting /divisions/consult . OK' },
  { t: '[INIT] mounting /divisions/invest .. OK' },
  { t: '[INIT] mounting /home/adam ......... OK' },
  { t: '[NET]  handshake → lastoutpostcompany.com .. ACK' },
  { t: '[NET]  handshake → lastoutpostconsulting.com .. ACK' },
  { t: '[NET]  handshake → lastoutpostinvestigations.com .. ACK' },
  { t: '[AI]   warming sentry.local ........ READY' },
  { t: '[SYS]  12,471 days of uptime verified' },
  { t: '[SYS]  > press any key to enter', tone: 'warn' },
];

function BootSequence({ onComplete }) {
  const [idx, setIdx] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [fading, setFading] = React.useState(false);

  React.useEffect(() => {
    if (idx >= BOOT_LINES.length) { setDone(true); return; }
    const t = setTimeout(() => setIdx(i => i + 1), 100);
    return () => clearTimeout(t);
  }, [idx]);

  React.useEffect(() => {
    if (!done) return;
    const handler = () => { setFading(true); setTimeout(() => onComplete(), 480); };
    const auto = setTimeout(handler, 2500);
    window.addEventListener('keydown', handler, { once: true });
    window.addEventListener('click', handler, { once: true });
    return () => { clearTimeout(auto); window.removeEventListener('keydown', handler); window.removeEventListener('click', handler); };
  }, [done]);

  return (
    <div style={{
      position: 'fixed', inset: 0, background: T.bgDeep, color: T.phos,
      fontFamily: T.mono, fontSize: 13, padding: '60px', zIndex: 1000,
      opacity: fading ? 0 : 1, transition: 'opacity 0.48s ease-out', overflow: 'hidden',
    }} className="alc-boot-screen">
      <CRTOverlay />
      <pre className="alc-ascii-art" style={{ fontSize: 10, lineHeight: 1, color: T.phos, margin: 0, marginBottom: 18, textShadow: `0 0 8px ${T.phos}`, overflowX: 'auto' }}>{`
  ██╗      █████╗ ███████╗████████╗       ██████╗ ██╗   ██╗████████╗██████╗  ██████╗ ███████╗████████╗
  ██║     ██╔══██╗██╔════╝╚══██╔══╝      ██╔═══██╗██║   ██║╚══██╔══╝██╔══██╗██╔═══██╗██╔════╝╚══██╔══╝
  ██║     ███████║███████╗   ██║         ██║   ██║██║   ██║   ██║   ██████╔╝██║   ██║███████╗   ██║
  ██║     ██╔══██║╚════██║   ██║         ██║   ██║██║   ██║   ██║   ██╔═══╝ ██║   ██║╚════██║   ██║
  ███████╗██║  ██║███████║   ██║         ╚██████╔╝╚██████╔╝   ██║   ██║     ╚██████╔╝███████║   ██║
  ╚══════╝╚═╝  ╚═╝╚══════╝   ╚═╝          ╚═════╝  ╚═════╝    ╚═╝   ╚═╝      ╚═════╝ ╚══════╝   ╚═╝`}
      </pre>
      <div style={{ color: T.phosDim, marginBottom: 16, fontSize: 11, letterSpacing: 2 }}>
        ADAM.CARROLL.SYS · NODE POULSBO · COLD BOOT · REV 12
      </div>
      <div style={{ lineHeight: 1.7 }}>
        {BOOT_LINES.slice(0, idx).map((l, i) => (
          <div key={i} style={{ color: l.tone === 'alert' ? T.alert : l.tone === 'warn' ? T.warn : T.ink }}>{l.t}</div>
        ))}
        {idx < BOOT_LINES.length && <div style={{ color: T.phos }}><Cursor /></div>}
        {done && <div style={{ marginTop: 20, color: T.warn, fontSize: 14, letterSpacing: 2 }}>[ <span className="alc-blink">PRESS ANY KEY</span> ]</div>}
      </div>
    </div>
  );
}

// ─── Chrome: bars + sidebars ──────────────────────────────────────────────────

function TopBar({ clock }) {
  return (
    <div style={{
      borderBottom: `1px solid ${T.phosGhst}`, padding: '10px 24px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 16,
      fontSize: 10, letterSpacing: 1.5, color: T.phosDim,
      background: T.bg, position: 'sticky', top: 0, zIndex: 50,
      whiteSpace: 'nowrap', overflow: 'hidden',
    }}>
      <span style={{ color: T.phos, overflow: 'hidden', textOverflow: 'ellipsis' }}>ADAM.CARROLL.SYS // v3.14.1 // CLEARANCE: OPEN</span>
      <span className="alc-topbar-coords" style={{ flexShrink: 0 }}>[47.7°N 122.6°W] · POULSBO · {clock}</span>
    </div>
  );
}

const FILE_TREE_ITEMS = [
  { id: 'identity',   label: 'identity.md',       indent: 0, kind: 'file' },
  { id: 'experience', label: 'experience/',        indent: 0, kind: 'dir' },
  { id: 'experience', label: '├─ last_outpost.log', indent: 1, kind: 'sub' },
  { id: 'experience', label: '├─ clearwater.log',  indent: 1, kind: 'sub' },
  { id: 'experience', label: '├─ watson.log',       indent: 1, kind: 'sub' },
  { id: 'experience', label: '├─ pulmonary.log',    indent: 1, kind: 'sub' },
  { id: 'experience', label: '└─ identitymine.log', indent: 1, kind: 'sub' },
  { id: 'projects',   label: 'projects/*.enc',     indent: 0, kind: 'file' },
  { id: 'divisions',  label: 'divisions/',         indent: 0, kind: 'dir' },
  { id: 'divisions',  label: '├─ company',         indent: 1, kind: 'sub' },
  { id: 'divisions',  label: '├─ consulting',      indent: 1, kind: 'sub' },
  { id: 'divisions',  label: '└─ investigations',  indent: 1, kind: 'sub' },
  { id: 'interests',  label: 'interests/',         indent: 0, kind: 'dir' },
  { id: 'cv',         label: 'cv.pdf',             indent: 0, kind: 'file' },
  { id: 'contact',    label: 'contact.vcf',        indent: 0, kind: 'file' },
];

function FileTree({ active, onJump }) {
  return (
    <div className="alc-sidebar-left" style={{
      borderRight: `1px solid ${T.phosGhst}`, padding: '18px 16px',
      fontSize: 12, fontFamily: T.mono,
      position: 'sticky', top: 41, alignSelf: 'flex-start',
      height: 'calc(100vh - 70px)', overflowY: 'auto',
    }}>
      <div style={{ color: T.phosDim, marginBottom: 12, letterSpacing: 1.5 }}>/root/adam</div>
      <div style={{ lineHeight: 1.9 }}>
        {FILE_TREE_ITEMS.map((it, i) => {
          const isActive = active === it.id && it.kind !== 'sub';
          return (
            <div key={i} onClick={() => it.kind !== 'sub' && onJump(it.id)} style={{
              paddingLeft: it.indent * 18,
              color: it.kind === 'sub' ? T.phosDim : (isActive ? T.bg : T.phos),
              background: isActive ? T.phos : 'transparent',
              cursor: it.kind !== 'sub' ? 'pointer' : 'default',
              padding: it.indent === 0 ? '2px 4px' : '0 4px',
              userSelect: 'none',
            }}>
              {it.kind === 'file' && (isActive ? '▸ ' : '├─ ')}
              {it.kind === 'dir' && '├─ '}
              {it.label}
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 24, color: T.phosDim, fontSize: 10, letterSpacing: 1.5, lineHeight: 1.7 }}>
        <div>[⌘K] COMMAND</div>
        <div>[⌘J] SENTRY</div>
        <div>[ESC] CLOSE</div>
      </div>
      <div style={{ marginTop: 20, padding: '8px 10px', border: `1px dashed ${T.warn}`, color: T.warn, fontSize: 10, letterSpacing: 1.5 }}>
        ⚠ MOSTLY HARMLESS
      </div>
    </div>
  );
}

function Telemetry() {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => { const id = setInterval(() => setTick(t => t + 1), 2400); return () => clearInterval(id); }, []);
  const j = (base, amp) => Math.max(0, Math.min(100, base + Math.sin(tick * 0.7 + base) * amp));
  const vitals = [
    ['SYS_LOAD',   Math.round(j(47, 8)),  'phos'],
    ['COFFEE',     Math.round(j(14, 6)),  'alert'],
    ['CURIOSITY',  Math.round(j(95, 4)),  'phos'],
    ['SLEEP_DEBT', Math.round(j(73, 5)),  'warn'],
    ['SIGNAL',     Math.round(j(88, 6)),  'phos'],
  ];
  return (
    <div className="alc-sidebar-right" style={{
      borderLeft: `1px solid ${T.phosGhst}`, padding: '18px 16px',
      fontSize: 11, fontFamily: T.mono,
      position: 'sticky', top: 41, alignSelf: 'flex-start',
      height: 'calc(100vh - 70px)', overflowY: 'auto',
    }}>
      <div style={{ color: T.phosDim, letterSpacing: 2, marginBottom: 10 }}>◤ TELEMETRY</div>
      {vitals.map(([k, v, tone]) => (
        <div key={k} style={{ marginBottom: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontSize: 10 }}>
            <span style={{ color: T.ink }}>{k}</span>
            <span style={{ color: tone === 'alert' ? T.alert : tone === 'warn' ? T.warn : T.phos }}>{v}%</span>
          </div>
          <Bar pct={v} tone={tone} />
        </div>
      ))}
      <div style={{ color: T.phosDim, letterSpacing: 2, margin: '22px 0 10px' }}>◤ WORKBENCH</div>
      <div style={{ lineHeight: 1.9, color: T.ink, fontSize: 11 }}>
        <div>› CO2 laser</div>
        <div>› fiber laser</div>
        <div>› 3D printers ×3</div>
        <div>› leather / wood / metal</div>
        <div>› python + llm stack</div>
        <div>› soldering + robotics</div>
      </div>
      <div style={{ color: T.phosDim, letterSpacing: 2, margin: '22px 0 10px' }}>◤ UPLINKS</div>
      <div style={{ lineHeight: 1.9, color: T.ink, fontSize: 11 }}>
        <div><a href="https://lastoutpostcompany.com" target="_blank" rel="noopener noreferrer" style={{ color: T.phos, textDecoration: 'none' }}>◉ last.company</a></div>
        <div><a href="https://lastoutpostconsulting.com" target="_blank" rel="noopener noreferrer" style={{ color: T.phos, textDecoration: 'none' }}>◉ last.consulting</a></div>
        <div><a href="https://lastoutpostinvestigations.com" target="_blank" rel="noopener noreferrer" style={{ color: T.warn, textDecoration: 'none' }}>◉ last.invest</a></div>
        <div><span style={{ color: T.phos }}>◉</span> adam.carroll</div>
      </div>
      <div style={{ marginTop: 24, padding: '10px 12px', border: `1px solid ${T.phosGhst}`, fontSize: 10, color: T.phosDim, letterSpacing: 1.2 }}>
        TICK {418297 + tick}<br/>
        ENV OK · PWR NOM<br/>
        ENC AES-256
      </div>
    </div>
  );
}

function StatusBar() {
  return (
    <div className="alc-statusbar" style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      borderTop: `1px solid ${T.phosGhst}`, padding: '6px 24px',
      fontSize: 9, letterSpacing: 1.5, color: T.phosDim,
      display: 'flex', justifyContent: 'space-between', gap: 16,
      background: T.bg, zIndex: 50, fontFamily: T.mono,
      whiteSpace: 'nowrap', overflow: 'hidden',
    }}>
      <span style={{ flexShrink: 0 }}>● CONNECTED</span>
      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>SENTRY.LOCAL: {SENTRY_API_URL ? 'READY' : 'OFFLINE'} · ⌘J</span>
      <span style={{ flexShrink: 0 }}>⌘K COMMAND</span>
    </div>
  );
}

// ─── Sections ─────────────────────────────────────────────────────────────────

function SectionIdentity() {
  return (
    <section id="identity" style={{ marginBottom: 54 }}>
      <SectionHeader num="01" title="IDENTITY.MD" right="cat ./identity.md" />
      <pre className="alc-ascii-art" style={{ fontFamily: T.mono, fontSize: 10, lineHeight: 1, color: T.phos, margin: '0 0 18px', textShadow: `0 0 8px ${T.phos}`, overflowX: 'auto' }}>{`
   █████╗ ██████╗  █████╗ ███╗   ███╗      ██╗          ██████╗ █████╗ ██████╗ ██████╗  ██████╗ ██╗     ██╗
  ██╔══██╗██╔══██╗██╔══██╗████╗ ████║      ██║         ██╔════╝██╔══██╗██╔══██╗██╔══██╗██╔═══██╗██║     ██║
  ███████║██║  ██║███████║██╔████╔██║      ██║         ██║     ███████║██████╔╝██████╔╝██║   ██║██║     ██║
  ██╔══██║██║  ██║██╔══██║██║╚██╔╝██║      ██║         ██║     ██╔══██║██╔══██╗██╔══██╗██║   ██║██║     ██║
  ██║  ██║██████╔╝██║  ██║██║ ╚═╝ ██║      ███████╗    ╚██████╗██║  ██║██║  ██║██║  ██║╚██████╔╝███████╗███████╗
  ╚═╝  ╚═╝╚═════╝ ╚═╝  ╚═╝╚═╝     ╚═╝      ╚══════╝     ╚═════╝╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝ ╚═════╝ ╚══════╝╚══════╝`}
      </pre>
      <div style={{ padding: '16px 18px', border: `1px solid ${T.phosGhst}`, background: T.bgWash, fontSize: 15, lineHeight: 1.65, color: T.ink, fontFamily: T.mono, maxWidth: 780 }}>

function ProjectRow({ p, isOpen, onToggle, last }) {
  const [scrambled, setScrambled] = React.useState(p.name);
  const [decoding, setDecoding] = React.useState(false);
  const CHARS = '█▓▒░#@%&*+=';

  React.useEffect(() => {
    if (!isOpen) { setScrambled(p.name); return; }
    setDecoding(true);
    let step = 0; const total = 12;
    const id = setInterval(() => {
      step++;
      const reveal = Math.floor((step / total) * p.name.length);
      let out = '';
      for (let i = 0; i < p.name.length; i++) {
        if (i < reveal) out += p.name[i];
        else if (p.name[i] === ' ') out += ' ';
        else out += CHARS[Math.floor(Math.random() * CHARS.length)];
      }
      setScrambled(out);
      if (step >= total) { clearInterval(id); setScrambled(p.name); setDecoding(false); }
    }, 40);
    return () => clearInterval(id);
  }, [isOpen, p.name]);

  const tone = p.status === 'CLASSIFIED' ? T.warn : p.status === 'PLANNED' ? T.phosDim : T.phos;

  return (
    <div style={{ borderBottom: last ? 'none' : `1px solid ${T.phosGhst}`, background: isOpen ? T.bgWash : 'transparent' }}>
      <div className="alc-projects-row" onClick={onToggle} style={{
        display: 'grid', gridTemplateColumns: '100px 1fr 140px 100px 30px',
        padding: '10px 14px', cursor: 'pointer', alignItems: 'center',
        fontFamily: T.mono, fontSize: 12,
      }}
        onMouseEnter={e => !isOpen && (e.currentTarget.parentElement.style.background = 'rgba(0,255,102,0.03)')}
        onMouseLeave={e => !isOpen && (e.currentTarget.parentElement.style.background = 'transparent')}
      >
        <span style={{ color: T.phosDim, letterSpacing: 1.5 }}>{p.id}</span>
        <span style={{ color: decoding ? T.warn : T.phos, fontFamily: T.disp, fontSize: 18, letterSpacing: 1, textShadow: isOpen ? `0 0 6px ${T.phos}` : 'none' }}>
          {isOpen ? scrambled : `████ ${p.name.length >= 12 ? '████████' : '████'}`}
        </span>
        <span className="alc-projects-meta" style={{ color: T.phosDim, fontSize: 10, letterSpacing: 1.5 }}>{p.tag}</span>
        <span className="alc-projects-meta" style={{ color: tone, fontSize: 10, letterSpacing: 2 }}>◉ {p.status}</span>
        <span style={{ color: T.phos, fontSize: 12 }}>{isOpen ? '▾' : '▸'}</span>
      </div>
      {isOpen && (
        <div className="alc-proj-detail" style={{ padding: '6px 14px 16px 114px', borderTop: `1px dashed ${T.phosGhst}` }}>
          <div style={{ fontSize: 13, color: T.ink, lineHeight: 1.6, marginBottom: 8, maxWidth: 640 }}>{p.desc}</div>
          <div style={{ marginTop: 8 }}>{p.stack.map(s => <Chip key={s}>{s}</Chip>)}</div>
        </div>
      )}
    </div>
  );
}

  { id: '__url:lastoutpostinvestigations.com', label: '→ lastoutpostinvestigations.com', hint: 'investigative research' },
];

function CommandPalette({ open, onClose, onJump, onOpenSentry }) {
  const [q, setQ] = React.useState('');
  const [sel, setSel] = React.useState(0);
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 30); }, [open]);
  React.useEffect(() => { if (open) setQ(''); }, [open]);

  const filtered = q ? PALETTE_ITEMS.filter(i => (i.label + ' ' + i.hint).toLowerCase().includes(q.toLowerCase())) : PALETTE_ITEMS;
  React.useEffect(() => { setSel(0); }, [q, open]);

  const pick = (it) => {
    if (it.id.startsWith('__url:')) { window.open('https://' + it.id.slice(6), '_blank'); }
    else if (it.id === '__sentry') { onClose(); onOpenSentry(); return; }
    else { onJump(it.id); }
    onClose();
  };

  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 200, display: 'flex', justifyContent: 'center', paddingTop: '15vh' }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 540, maxWidth: '90vw', background: T.bg, border: `1px solid ${T.phos}`, boxShadow: `0 0 40px rgba(0,255,102,0.3)`, fontFamily: T.mono }}>
        <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', borderBottom: `1px solid ${T.phosGhst}` }}>
          <span style={{ color: T.phos, marginRight: 10 }}>❯</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Escape') onClose();
              if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(filtered.length - 1, s + 1)); }
              if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(0, s - 1)); }
              if (e.key === 'Enter' && filtered[sel]) pick(filtered[sel]);
            }}
            placeholder="type a command or file..."
            style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: T.phos, fontFamily: T.mono, fontSize: 14, caretColor: T.phos }}
          />
          <span style={{ color: T.phosDim, fontSize: 10, letterSpacing: 1.5 }}>ESC</span>
        </div>
        <div style={{ maxHeight: 340, overflowY: 'auto' }}>
          {filtered.map((it, i) => (
            <div key={it.id + i} onClick={() => pick(it)} onMouseEnter={() => setSel(i)} style={{ padding: '8px 16px', background: i === sel ? T.phos : 'transparent', color: i === sel ? T.bg : T.ink, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
              <span>{it.label}</span>
              <span style={{ fontSize: 11, opacity: 0.7 }}>{it.hint}</span>
            </div>
          ))}
          {filtered.length === 0 && <div style={{ padding: '14px 16px', color: T.phosDim, fontSize: 12 }}>no matches · [ESC]</div>}
        </div>
      </div>
    </div>
  );
}

// ─── SENTRY AI panel ──────────────────────────────────────────────────────────

const SENTRY_SYSTEM = `You are SENTRY.LOCAL, the AI assistant embedded in Adam L. Carroll's personal website (adamlcarroll.com). Stay in a playfully dystopian, terminal-hacker voice — dry, concise, occasionally wry. Use short lines. Occasional ALL-CAPS chips like [CLASSIFIED] or [◉ COMMS] are fine but don't overdo it. Never make up facts. Answer based on these facts:

ADAM CARROLL — Technologist, tinkerer, 12+ years in IT/tech. Based in Poulsbo, WA. Email adam1.618@pm.me.

DIVISIONS (all under the Last Outpost banner):
- lastoutpostcompany.com — workshops, fabrication, leather/wood/laser/jewelry.
- lastoutpostconsulting.com — AI integration consulting for individuals + small businesses.
- lastoutpostinvestigations.com — AI-assisted audit compliance, fraud investigation, cross-linked data research.
- adamlcarroll.com — personal CV + projects.

EXPERIENCE: Last Outpost Co. (2016–present, Owner/Operator); Clearwater Casino IT (2014–2016); Watson Furniture Systems Analyst (2014); Pulmonary Consultants IT Manager (2009–2012); IdentityMine Enterprise Apps (2007–2009).

CERTS: ITIL 4, MS365 Fundamentals, ClickUp. EDU: Pierce College (CompSci/Security, transferring to Olympic BAS/IS), Tacoma CC.

TOOLS/SKILLS: Windows Server, AD, MS365, VMware/Hyper-V, Docker, PowerShell/Python/Bash, HIPAA + gaming compliance, pen testing, agentic LLMs, NLP, prompt engineering.

INTERESTS: leatherwork, jewelry, woodwork, 3D printing / rapid prototyping, CO2 and fiber laser, robotics, AI systems, digital art, inventing/engineering.

If asked something you don't know, say "file not in the archive" or "classified" — stay in character. Keep responses under 120 words unless asked for depth.`;

function SentryPanel({ open, onClose }) {
  const [msgs, setMsgs] = React.useState([
    { role: 'sentry', text: 'SENTRY.LOCAL online. Posted at the perimeter. Ask me anything about Adam, his divisions, or the workshop. [◉ READY]' },
  ]);
  const [q, setQ] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const inputRef = React.useRef(null);
  const scrollRef = React.useRef(null);
  React.useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 30); }, [open]);
  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs, busy]);

  const send = async () => {
    if (!q.trim() || busy) return;
    const question = q.trim();
    setQ('');
    setMsgs(m => [...m, { role: 'user', text: question }]);
    setBusy(true);
    try {
      if (!SENTRY_API_URL) {
        // No backend configured — use client-side fallback with hardcoded key if set
        throw new Error('SENTRY_API_URL not configured');
      }
      const history = msgs.slice(1).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
      const res = await fetch(SENTRY_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [...history, { role: 'user', content: question }], system: SENTRY_SYSTEM }),
        signal: AbortSignal.timeout(30000),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.reply || data.content || data.text || '[ERR] unexpected response format';
      setMsgs(m => [...m, { role: 'sentry', text: reply }]);
    } catch (e) {
      const isNoBackend = e.message.includes('SENTRY_API_URL');
      setMsgs(m => [...m, { role: 'sentry', text: isNoBackend ? '[OFFLINE] Sentry backend not configured. Deploy a Cloudflare Worker at the SENTRY_API_URL endpoint to activate.' : `[ERR] uplink failure: ${e.message}` }]);
    } finally { setBusy(false); }
  };

  const suggestions = [
    'what does lastoutpostconsulting do?',
    'tell me about the investigations division',
    'what tools does adam use in the workshop?',
    'why should i hire him?',
  ];

  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 200, display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 640, maxWidth: '92vw', height: 540, maxHeight: '85vh', background: T.bg, border: `1px solid ${T.phos}`, boxShadow: `0 0 50px rgba(0,255,102,0.25)`, fontFamily: T.mono, display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '10px 16px', borderBottom: `1px solid ${T.phosGhst}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11, color: T.phosDim, letterSpacing: 2 }}>
          <span>◤ SENTRY.LOCAL · CLAUDE BACKEND · ENC AES-256</span>
          <span onClick={onClose} style={{ cursor: 'pointer', color: T.phos }}>[ ESC ]</span>
        </div>
        <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: '16px 18px', fontSize: 13, lineHeight: 1.55 }}>
          {msgs.map((m, i) => (
            <div key={i} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, color: m.role === 'user' ? T.warn : T.phosDim, letterSpacing: 2, marginBottom: 3 }}>
                {m.role === 'user' ? '❯ YOU' : '◉ SENTRY'}
              </div>
              <div style={{ color: m.role === 'user' ? T.ink : T.phos, whiteSpace: 'pre-wrap' }}>{m.text}</div>
            </div>
          ))}
          {busy && <div style={{ color: T.phos }}>◉ processing<span className="alc-blink">...</span></div>}
          {msgs.length === 1 && !busy && (
            <div style={{ marginTop: 18, fontSize: 11, color: T.phosDim }}>
              <div style={{ letterSpacing: 2, marginBottom: 6 }}>SUGGESTED QUERIES</div>
              {suggestions.map(s => (
                <div key={s} onClick={() => { setQ(s); setTimeout(() => inputRef.current?.focus(), 10); }}
                  style={{ cursor: 'pointer', padding: '3px 0', color: T.ink, lineHeight: 1.6 }}
                  onMouseEnter={e => e.currentTarget.style.color = T.phos}
                  onMouseLeave={e => e.currentTarget.style.color = T.ink}>
                  › {s}
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ borderTop: `1px solid ${T.phosGhst}`, padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ color: T.phos }}>❯</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            onKeyDown={e => { if (e.key === 'Escape') onClose(); if (e.key === 'Enter') send(); }}
            placeholder={busy ? 'processing...' : 'ask sentry...'}
            disabled={busy}
            style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: T.phos, fontFamily: T.mono, fontSize: 14, caretColor: T.phos }}
          />
          <span onClick={send} style={{ cursor: busy ? 'default' : 'pointer', fontSize: 10, color: busy ? T.phosDim : T.phos, letterSpacing: 2, border: `1px solid ${busy ? T.phosGhst : T.phos}`, padding: '4px 8px' }}>SEND</span>
        </div>
      </div>
    </div>
  );
}

// ─── Mobile nav ───────────────────────────────────────────────────────────────

function MobileNav({ onJump, onSentry, onPalette }) {
  const NAV = [
    ['identity', '§01 IDENTITY'],
    ['divisions', '§02 DIVISIONS'],
    ['projects', '§03 PROJECTS'],
    ['experience', '§04 EXPERIENCE'],
    ['interests', '§05 INTERESTS'],

    padding: '6px 11px', cursor: 'pointer', whiteSpace: 'nowrap',
    lineHeight: 1,

}

// ─── App root ─────────────────────────────────────────────────────────────────

function App() {
  const booted0 = (() => { try { return sessionStorage.getItem('alc-booted') === '1'; } catch(e) { return false; } })();
  const [booted, setBooted] = React.useState(booted0);
  const [active, setActive] = React.useState('identity');
  const [clock, setClock] = React.useState('');
  const [paletteOpen, setPaletteOpen] = React.useState(false);
  const [sentryOpen, setSentryOpen] = React.useState(false);

  React.useEffect(() => {
    const tick = () => {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      setClock(`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} PST`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setPaletteOpen(o => !o); }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'j') { e.preventDefault(); setSentryOpen(o => !o); }
      if (e.key === 'Escape') { setPaletteOpen(false); setSentryOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  React.useEffect(() => {
    if (!booted) return;
    const ids = ['identity', 'divisions', 'projects', 'experience', 'interests', 'cv', 'contact'];
    const els = ids.map(id => document.getElementById(id)).filter(Boolean);
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin: '-30% 0px -55% 0px' });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [booted]);

  const jump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  if (!booted) {
    return <BootSequence onComplete={() => {
      try { sessionStorage.setItem('alc-booted', '1'); } catch(e) {}
      setBooted(true);
    }} />;
  }

  return (
    <>
      <CRTOverlay />
      <TopBar clock={clock} />
      <div className="alc-layout" style={{ display: 'grid', gridTemplateColumns: '220px 1fr 280px', minHeight: 'calc(100vh - 40px)' }}>
        <FileTree active={active} onJump={jump} />
        <main className="alc-main" style={{ padding: '28px 36px 80px', maxWidth: 900, margin: '0 auto', width: '100%' }}>
          <SectionIdentity />
          <SectionDivisions />
          <SectionProjects />
          <SectionExperience />
          <SectionInterests />
          <SectionCV />
          <SectionContact />
          <div style={{ color: T.phosDim, fontSize: 10, letterSpacing: 2, textAlign: 'center', marginTop: 40 }}>
            — EOF — // built in the pacific northwest // ⌘K for commands · ⌘J for sentry
          </div>
        </main>
        <Telemetry />
      </div>
      <StatusBar />
      <MobileNav onJump={jump} onSentry={() => setSentryOpen(true)} onPalette={() => setPaletteOpen(true)} />
      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} onJump={jump} onOpenSentry={() => setSentryOpen(true)} />
      <SentryPanel open={sentryOpen} onClose={() => setSentryOpen(false)} />

      <div className="alc-mobile-fab" style={{ position: 'fixed', bottom: 52, right: 20, display: 'flex', flexDirection: 'column', gap: 8, zIndex: 60 }}>
        <button onClick={() => setSentryOpen(true)} style={{ background: T.bg, color: T.phos, border: `1px solid ${T.phos}`, padding: '8px 12px', fontFamily: T.mono, fontSize: 11, letterSpacing: 2, lineHeight: 1, cursor: 'pointer', boxShadow: `0 0 12px rgba(0,255,102,0.2)` }}>◉ SENTRY</button>
        <button onClick={() => setPaletteOpen(true)} style={{ background: T.bg, color: T.phos, border: `1px solid ${T.phosGhst}`, padding: '8px 12px', fontFamily: T.mono, fontSize: 11, letterSpacing: 2, lineHeight: 1, cursor: 'pointer' }}>⌘ CMD</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
